<div class="container">
  <h1>🎓 Student List</h1>

  <!-- Loading -->
  <p *ngIf="loading">Loading...</p>

  <!-- Error -->
  <p *ngIf="error" class="error">{{ error }}</p>

  <!-- All Students Table -->
  <table *ngIf="!loading && students.length > 0">
    <thead>
      <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Age</th>
        <th>Grade</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let student of students">
        <td>{{ student.id }}</td>
        <td>{{ student.name }}</td>
        <td>{{ student.age }}</td>
        <td>{{ student.grade }}</td>
        <td>
          <button (click)="selectStudent(student.id)">View</button>
        </td>
      </tr>
    </tbody>
  </table>

  <!-- Selected Student Detail -->
  <div *ngIf="selectedStudent" class="detail">
    <h2>Student Detail</h2>
    <p><strong>ID:</strong> {{ selectedStudent.id }}</p>
    <p><strong>Name:</strong> {{ selectedStudent.name }}</p>
    <p><strong>Age:</strong> {{ selectedStudent.age }}</p>
    <p><strong>Grade:</strong> {{ selectedStudent.grade }}</p>
    <button (click)="clearSelection()">Close</button>
  </div>
</div>
