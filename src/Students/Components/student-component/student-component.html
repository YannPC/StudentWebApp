<div class="container">
  <h1>🎓 Students List</h1>

  <!-- Loading -->
  <p *ngIf="loading">Loading...</p>

  <!-- Error -->
  <p *ngIf="error" class="error">{{ error }}</p>

  <!-- All Students Table -->
  <table *ngIf="!loading && students.length > 0">
    <thead>
      <tr>
        <th>ID</th>
        <th>FirstName</th>
        <th>LastName</th>
        <th>Age</th>
        <th>Grade</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let student of students">
        <td>{{ student.id }}</td>
        <td>{{ student.firstName }}</td>
        <td>{{ student.lastName }}</td>
        <td>{{ student.age }}</td>
        <td>{{ student.grade }}</td>
        <td>
          <button (click)="viewStudent(student.id)">View</button>
        </td>
      </tr>
    </tbody>
  </table>
</div>
